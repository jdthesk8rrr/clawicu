<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810"/>
      <stop offset="100%" style="stop-color:#0a0f1a"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4d4d"/>
      <stop offset="100%" style="stop-color:#00e5cc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
  </g>
  <!-- Title -->
  <text x="600" y="260" font-family="system-ui, sans-serif" font-size="120" font-weight="800" fill="#f0f4ff" text-anchor="middle">
    Claw<tspan fill="url(#text)">ICU</tspan>
  </text>
  <text x="600" y="340" font-family="system-ui, sans-serif" font-size="32" fill="#8892b0" text-anchor="middle">
    OpenClaw Emergency Rescue
  </text>
  <!-- Command -->
  <rect x="250" y="400" width="700" height="80" rx="12" fill="#0a0f1a" stroke="#ff4d4d" stroke-opacity="0.3"/>
  <text x="600" y="455" font-family="ui-monospace, monospace" font-size="28" fill="#00e5cc" text-anchor="middle">
    curl -fsSL https://xagent.icu/r | sh
  </text>
  <!-- Footer -->
  <text x="600" y="580" font-family="system-ui, sans-serif" font-size="20" fill="#5a6480" text-anchor="middle">
    xagent.icu
  </text>
</svg>